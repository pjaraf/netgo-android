name: Build NetGo Mobile APK

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Use a fixed debug signing key (so updates install over old versions)
        working-directory: .
        run: |
          mkdir -p ~/.android
          cp mobile/keystore/debug.keystore ~/.android/debug.keystore

      - name: Stamp app version (for the in-app update checker)
        run: node scripts/patch-version.js
        env:
          APP_VERSION: ${{ github.run_number }}

      - name: Add Android platform
        run: npx cap add android

      - name: Install native libVLC player plugin (full codec support)
        run: node scripts/patch-vlc-plugin.js

      - name: Generate app icons and TV banner (all densities)
        run: node scripts/generate-icons.js

      - name: Add Android TV home-screen launcher support
        run: node scripts/patch-tv-launcher.js

      - name: Keep MainActivity alive across screen rotation (fullscreen video)
        run: node scripts/patch-orientation.js

      - name: Register Google Cast (Chromecast / Android TV casting)
        run: node scripts/patch-cast.js

      - name: Add camera permission (for QR code scanning)
        run: node scripts/patch-camera.js

      - name: Allow cleartext (http://) traffic for IPTV providers
        run: node scripts/patch-cleartext.js

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK (build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: netgo-mobile-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK as a GitHub Release (stable public download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: NetGo build ${{ github.run_number }}
          files: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true

      - name: Publish version.json (so the app can detect this update)
        working-directory: .
        run: |
          mkdir -p docs
          printf '{\n  "version": %s\n}\n' "${{ github.run_number }}" > docs/version.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/version.json
          git commit -m "Update version.json to build ${{ github.run_number }} [skip ci]" || echo "No changes to commit"
          git push
